<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | ООО «Чалама»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22252f;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --gold: #b8860b;
            --gold-l: #d4a017;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,.12);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59,130,246,.12);
            --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(ellipse at top, #1a1d27 0%, #0f1117 70%); }
        .login-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:3rem; width:90%; max-width:420px; text-align:center; }
        .login-logo { font-size:1.5rem; font-weight:900; letter-spacing:4px; margin-bottom:.5rem; }
        .login-logo em { color:var(--gold); font-style:normal; }
        .login-input { width:100%; padding:1rem 1.2rem; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; color:var(--text); margin-bottom:1rem; outline:none; }
        .login-btn { width:100%; padding:1rem; background:var(--gold); color:#fff; border:none; border-radius:12px; font-weight:700; cursor:pointer; text-transform:uppercase; transition:.3s; }

        .dashboard { display:none; }
        .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .main { max-width:1400px; margin:0 auto; padding:2rem; }

        .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1.2rem; margin-bottom:2.5rem; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; }
        .stat-value { font-size:1.8rem; font-weight:900; margin-bottom:.2rem; }
        .stat-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

        .tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:.5rem; }
        .tab { padding:.7rem 1.2rem; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; color:var(--muted); font-size:.8rem; font-weight:600; cursor:pointer; white-space:nowrap; }
        .tab.active { background:var(--gold); border-color:var(--gold); color:#fff; }
        .tab-count { background:rgba(255,255,255,.1); padding:2px 6px; border-radius:4px; margin-left:6px; font-size:.7rem; }

        .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:auto; }
        table { width:100%; border-collapse:collapse; min-width:1000px; }
        th { text-align:left; padding:1rem; font-size:.7rem; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); }
        td { padding:1rem; font-size:.85rem; border-bottom:1px solid var(--border); }
        tr:hover { background:var(--surface2); }

        .tag { padding:4px 10px; border-radius:50px; font-size:.65rem; font-weight:700; text-transform:uppercase; }
        .tag-new { background:var(--gold-l); color:#000; }
        .tag-confirmed { background:var(--green-bg); color:var(--green); }
        .tag-cancelled { background:var(--red-bg); color:var(--red); }

        /* Chess */
        .chess-wrapper { position: relative; overflow: auto; max-height: 70vh; border-radius: var(--radius); border: 1px solid var(--border); background: #11141d; }
        .chess-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .chess-table th { position: sticky; top: 0; z-index: 20; background: #1a1f2e; border-bottom: 2px solid var(--border); text-align: center; }
        .chess-table th:first-child { position: sticky; left: 0; z-index: 30; background: #1a1f2e; min-width: 200px; text-align: left; border-right: 2px solid var(--border); }
        .chess-table td:first-child { position: sticky; left: 0; z-index: 10; background: #1a1f2e; border-right: 2px solid var(--border); font-weight: 700; }
        .chess-cell { border: 0.5px solid #2a2d3a; height: 50px; position: relative; cursor: cell; min-width: 50px; }
        .chess-cell.selected { background: var(--gold) !important; }
        .chess-booking { height: 100%; width: 100%; display: flex; align-items: center; padding: 0 5px; font-size: 0.6rem; color: #fff; overflow: hidden; }
        .chess-split { width: 100%; height: 100%; position: relative; }
        .chess-split-out { position: absolute; top:0; left:0; width:100%; height:100%; clip-path: polygon(0 0, 100% 0, 0 100%); }
        .chess-split-in { position: absolute; top:0; left:0; width:100%; height:100%; clip-path: polygon(100% 0, 100% 100%, 0 100%); }

        /* Calendar Reception */
        .adm-cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .adm-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .adm-cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: var(--surface2); border-radius: 8px; cursor: pointer; font-size: .8rem; font-weight: 600; border: 1.5px solid transparent; }
        .adm-cal-day.selected { background: var(--gold); border-color: var(--gold); color: #fff; }
        .adm-cal-day.booked { background: var(--red-bg); color: var(--red); cursor: not-allowed; opacity: 0.5; }
        .adm-cal-day.booked-in { background: linear-gradient(135deg, var(--surface2) 50%, var(--red-bg) 50%); }
        .adm-cal-day.booked-out { background: linear-gradient(135deg, var(--red-bg) 50%, var(--surface2) 50%); }

        .hour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; margin-top: 1rem; }
        .hour-btn { padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: .75rem; text-align: center; cursor: pointer; }
        .hour-btn.selected { background: var(--gold); border-color: var(--gold); color: #fff; }
        .hour-btn.booked { background: var(--red-bg); color: var(--red); opacity: 0.3; cursor: not-allowed; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 500px; padding: 2rem; }
        .form-input { width: 100%; padding: .8rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 1rem; outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .btn-action { padding: .6rem 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }
        .btn-gold { background: var(--gold); border-color: var(--gold); color: #fff; }
        
        .room-mgmt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 1rem 0; }
        .photo-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1.5; border: 1px solid var(--border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-del-photo { position: absolute; top: 4px; right: 4px; background: rgba(255,0,0,0.7); border: none; color: #fff; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
    <div class="login-card">
        <div class="login-logo">ООО <em>ЧАЛАМА</em></div>
        <input class="login-input" type="password" id="loginPass" placeholder="Пароль">
        <button class="login-btn" onclick="doLogin()">Войти</button>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-logo">ЧАЛАМА <em>ADMIN</em></div>
        <button class="btn-action" onclick="doLogout()">Выйти</button>
    </div>

    <div class="main">
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Всего</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-active" style="color:var(--green)">0</div><div class="stat-label">Активных</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-cancelled" style="color:var(--red)">0</div><div class="stat-label">Отмена</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-revenue" style="color:var(--gold-l)">0 ₽</div><div class="stat-label">Доход</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('all')" id="tab-all">Все брони <span class="tab-count" id="cnt-all">0</span></button>
            <button class="tab" onclick="switchTab('reception')" id="tab-reception">🔑 Ресепшн</button>
            <button class="tab" onclick="switchTab('hotel')" id="tab-hotel">🏨 Отель и Сауна</button>
            <button class="tab" onclick="switchTab('yurt')" id="tab-yurt">⛺ Юрты и Баня</button>
            <button class="tab" onclick="switchTab('photos')" id="tab-photos">🖼 Галерея</button>
            <button class="tab" onclick="switchTab('broadcast')" id="tab-broadcast">📢 Рассылка</button>
            <button class="tab" onclick="switchTab('menus')" id="tab-menus">🍽 Меню</button>
        </div>

        <!-- Section: All Bookings -->
        <div id="bookingsSection">
            <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem; align-items:center;">
                <input class="form-input" style="width:400px; margin:0" type="text" placeholder="Поиск по гостю или телефону..." id="searchInput" oninput="renderTable()">
                <button class="btn-action" onclick="clearArchive()" style="border-color:var(--red); color:var(--red)">Очистить архив</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>Тип</th><th>Объект</th><th>Гость</th><th>Даты</th><th>Сумма</th><th>Статус</th></tr></thead>
                    <tbody id="bodyAll"></tbody>
                </table>
            </div>
        </div>

        <!-- Section: Reception -->
        <div id="receptionSection" style="display:none">
            <div style="display:grid; grid-template-columns: 1fr 350px; gap: 2rem;">
                <div class="stat-card">
                    <div class="adm-cal-header">
                        <button class="btn-action" onclick="changeRecMonth(-1)">◄</button>
                        <h3 id="recCalTitle">Апрель 2026</h3>
                        <button class="btn-action" onclick="changeRecMonth(1)">►</button>
                    </div>
                    <div class="adm-cal-grid" id="recCalGrid"></div>
                    <div id="recHourPanel" style="display:none; margin-top:2rem;">
                        <h4>Выберите часы</h4>
                        <div class="hour-grid" id="recHourGrid"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <h3>Новая бронь</h3>
                    <label style="font-size:.7rem; color:var(--muted)">ТИП ОБЪЕКТА</label>
                    <select id="recTypeSelect" class="form-input" onchange="selectRecType(this.value)">
                        <option value="hotel">Отель</option>
                        <option value="sauna">Сауна</option>
                        <option value="yurt">Юрты</option>
                        <option value="bath">Баня</option>
                    </select>
                    <label style="font-size:.7rem; color:var(--muted)">ВЫБЕРИТЕ НОМЕР / ЗАЛ</label>
                    <select id="recRoomSelect" class="form-input" onchange="onRecRoomChange()"></select>
                    <div id="recSelectionSummary" style="padding:1rem; background:var(--surface2); border-radius:10px; margin-bottom:1rem; font-size:.85rem; color:var(--gold-l)"></div>
                    <input type="text" id="recGuestName" class="form-input" placeholder="Имя гостя">
                    <input type="text" id="recGuestPhone" class="form-input" placeholder="Телефон">
                    <input type="number" id="recTotal" class="form-input" placeholder="Итоговая сумма">
                    <button class="login-btn" onclick="createManualBooking()">Создать бронь</button>
                    <p id="recStatusMsg" style="margin-top:1rem; font-size:.85rem"></p>
                </div>
            </div>
        </div>

        <!-- Section: Hotel & Chess -->
        <div id="hotelSection" style="display:none">
            <div style="display:flex; justify-content:space-between; margin-bottom:1.2rem; align-items:center;">
                <h3 style="color:var(--gold-l)">🏨 Отель (Шахматка)</h3>
                <div>
                    <button onclick="chessNav(-7)" class="btn-action">◄ 7д</button>
                    <button onclick="chessToday()" class="btn-action" style="color:var(--gold)">Сегодня</button>
                    <button onclick="chessNav(7)" class="btn-action">7д ►</button>
                </div>
            </div>
            <div id="hotelGrid" class="chess-wrapper"></div>
            <div class="stat-card" style="margin-top:2rem">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h4>🧖‍♂️ Сауна (Чалама)</h4>
                    <input type="date" id="saunaDate" onchange="loadHourly('sauna')" class="form-input" style="width:auto; margin:0">
                </div>
                <div id="saunaGrid" class="hour-grid"></div>
                <button id="saunaBookBtn" class="login-btn" style="width:auto; margin-top:1rem; display:none" onclick="bookHourly('sauna')">Забронировать выбранные часы</button>
            </div>
        </div>

        <!-- Section: Yurt & Bath -->
        <div id="yurtSection" style="display:none">
            <div style="display:flex; justify-content:space-between; margin-bottom:1.2rem; align-items:center;">
                <h3 style="color:var(--gold-l)">⛺ Юрты (Шахматка)</h3>
                <div>
                    <button onclick="chessNav(-7)" class="btn-action">◄ 7д</button>
                    <button onclick="chessToday()" class="btn-action" style="color:var(--gold)">Сегодня</button>
                    <button onclick="chessNav(7)" class="btn-action">7д ►</button>
                </div>
            </div>
            <div id="yurtGrid" class="chess-wrapper"></div>
            <div class="stat-card" style="margin-top:2rem">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h4>🪵 Баня (ХААН-ДЫТ)</h4>
                    <input type="date" id="bathDate" onchange="loadHourly('bath')" class="form-input" style="width:auto; margin:0">
                </div>
                <div id="bathGrid" class="hour-grid"></div>
                <button id="bathBookBtn" class="login-btn" style="width:auto; margin-top:1rem; display:none" onclick="bookHourly('bath')">Забронировать выбранные часы</button>
            </div>
        </div>

        <!-- Section: Photos / Room Management -->
        <div id="photosSection" style="display:none">
            <div id="roomsPhotoList"></div>
        </div>

        <!-- Section: Broadcast -->
        <div id="broadcastSection" style="display:none">
            <div class="stat-card">
                <p>Получателей: <span id="recipientCount" style="color:var(--gold-l); font-weight:800">0</span></p>
                <textarea id="broadcastMessage" class="form-input" style="height:150px; margin-top:1rem; resize:none" placeholder="Текст сообщения..."></textarea>
                <button class="login-btn" onclick="sendBroadcast()">📢 Отправить рассылку</button>
                <div id="broadcastHistory" style="margin-top:2rem; border-top:1px solid var(--border)"></div>
            </div>
        </div>

        <!-- Section: Menus -->
        <div id="menusSection" style="display:none">
            <div style="display:grid; gap:2rem">
                <div class="stat-card"><h4>Ресторан</h4><input type="file" id="menu-file-restaurant" onchange="uploadMenuImg('restaurant')"><div id="menu-grid-restaurant" class="photo-grid"></div></div>
                <div class="stat-card"><h4>Бар</h4><input type="file" id="menu-file-bar" onchange="uploadMenuImg('bar')"><div id="menu-grid-bar" class="photo-grid"></div></div>
                <div class="stat-card"><h4>Кафе КД</h4><input type="file" id="menu-file-cafe_kd" onchange="uploadMenuImg('cafe_kd')"><div id="menu-grid-cafe_kd" class="photo-grid"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- Booking Modal (Chess) -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
            <h3 style="color:var(--gold-l)">Новое бронирование</h3>
            <span style="cursor:pointer; font-size:1.5rem" onclick="closeModal()">×</span>
        </div>
        <div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ОБЪЕКТ</label><input type="text" id="m_room" class="form-input" readonly style="background:var(--surface2)"></div>
        <div class="form-row"><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ЗАЕЗД</label><input type="date" id="m_checkIn" class="form-input"></div><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ВЫЕЗД</label><input type="date" id="m_checkOut" class="form-input"></div></div>
        <div class="form-row"><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ИМЯ</label><input type="text" id="m_guest" class="form-input"></div><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ТЕЛЕФОН</label><input type="text" id="m_phone" class="form-input"></div></div>
        <div class="form-row"><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ДНИ/ЧАСЫ</label><input type="number" id="m_nights" class="form-input" readonly></div><div class="form-group"><label style="font-size:.7rem; color:var(--muted)">ИТОГО (₽)</label><input type="number" id="m_total" class="form-input"></div></div>
        <button class="login-btn" onclick="submitModalBooking()" style="margin-top:1rem">Забронировать</button>
    </div>
</div>

<!-- Room Management Modal -->
<div class="modal-overlay" id="roomModalOverlay">
    <div class="modal-card" style="max-width:600px">
        <h3 id="roomModalTitle" style="margin-bottom:1.5rem; color:var(--gold-l)">Редактировать номер</h3>
        <input type="hidden" id="r_id">
        <div class="form-row">
            <div class="form-group"><label>ТИП</label><select id="r_type" class="form-input"><option value="hotel">Отель</option><option value="yurt">Юрты</option><option value="sauna">Сауна</option><option value="bath">Баня</option></select></div>
            <div class="form-group"><label>НАЗВАНИЕ</label><input type="text" id="r_name" class="form-input"></div>
        </div>
        <div class="form-group"><label>ОПИСАНИЕ</label><textarea id="r_desc" class="form-input" style="height:80px; resize:none"></textarea></div>
        <div class="form-row">
            <div class="form-group"><label>ЦЕНА (БУДНИ)</label><input type="number" id="r_price" class="form-input"></div>
            <div class="form-group"><label>ЦЕНА (ВЫХОДНЫЕ)</label><input type="number" id="r_priceWeekend" class="form-input"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>ПЛОЩАДЬ</label><input type="text" id="r_area" class="form-input"></div>
            <div class="form-group"><label>ВМЕСТИМОСТЬ</label><input type="number" id="r_capacity" class="form-input"></div>
        </div>
        <div class="form-group"><label>УДОБСТВА (через запятую)</label><input type="text" id="r_amenities" class="form-input"></div>
        <div style="display:flex; gap:1rem; margin-top:1rem">
            <button class="login-btn" onclick="saveRoom()">Сохранить</button>
            <button class="btn-action" onclick="closeRoomModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
const ADMIN_PASS = 'chalama2026';
let currentTab = 'all', globalBookings = [], globalRooms = [], chessDate = new Date(); chessDate.setHours(0,0,0,0);
let selStart = null, selEnd = null, selRow = null, selectedHours = [];
const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

function doLogin() {
    if(document.getElementById('loginPass').value === ADMIN_PASS) { sessionStorage.setItem('chalama_admin','1'); showDashboard(); }
    else alert("Неверный пароль");
}
function doLogout() { sessionStorage.removeItem('chalama_admin'); location.reload(); }

function showDashboard() {
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dashboard').style.display='block';
    renderAll();
    setInterval(renderAll, 30000);
}

async function renderAll() {
    try {
        const res = await fetch('/api/admin/bookings');
        globalBookings = await res.json();
        const active = globalBookings.filter(b => b.status === 'confirmed' || b.status === 'new');
        document.getElementById('stat-total').textContent = globalBookings.length;
        document.getElementById('stat-active').textContent = active.length;
        document.getElementById('stat-cancelled').textContent = globalBookings.filter(b => b.status === 'cancelled').length;
        document.getElementById('stat-revenue').textContent = active.reduce((s,b)=>s+(b.total||0),0).toLocaleString() + ' ₽';
        document.getElementById('cnt-all').textContent = globalBookings.filter(b=>b.status==='new').length;
        renderTable();
    } catch(e) { console.error(e); }
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 'tab-'+tab));
    ['bookingsSection','receptionSection','hotelSection','yurtSection','photosSection','broadcastSection','menusSection'].forEach(s => {
        const el = document.getElementById(s); if(el) el.style.display = (tab==='all' && s==='bookingsSection') || s.startsWith(tab) ? 'block' : 'none';
    });
    if(tab==='hotel' || tab==='yurt') loadChessGrid(tab);
    if(tab==='reception') initReception();
    if(tab==='photos') loadRoomsForPhotos();
    if(tab==='broadcast') { loadRecipients(); loadBroadcastHistory(); }
    if(tab==='menus') loadAllMenus();
}

function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = globalBookings.filter(b => b.guest?.toLowerCase().includes(q) || b.phone?.includes(q) || (b.room||'').toLowerCase().includes(q));
    document.getElementById('bodyAll').innerHTML = filtered.map(b => `
        <tr>
            <td><small>${b.id.slice(0,6)}</small></td>
            <td><span class="tag tag-${b.type}">${b.type}</span></td>
            <td>${b.room} ${b.unitNumber?'<b>№'+b.unitNumber+'</b>':''}</td>
            <td>${b.guest}<br><small>${b.phone}</small></td>
            <td>${new Date(b.checkIn).toLocaleDateString()}</td>
            <td>${(b.total||0).toLocaleString()} ₽</td>
            <td>
                <select onchange="updateStatus('${b.id}',this.value)" style="background:var(--surface2);color:#fff;border:1px solid var(--border);border-radius:6px;padding:3px">
                    <option value="new" ${b.status==='new'?'selected':''}>Новая</option>
                    <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Ок</option>
                    <option value="completed" ${b.status==='completed'?'selected':''}>🏁</option>
                    <option value="cancelled" ${b.status==='cancelled'?'selected':''}>❌</option>
                </select>
            </td>
        </tr>
    `).join('');
}

async function updateStatus(id, status) {
    await fetch(`/api/admin/bookings/${id}/status`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
    renderAll();
}

async function clearArchive() {
    if(!confirm("Удалить все завершенные и отмененные бронирования навсегда?")) return;
    await fetch('/api/admin/bookings/archive', { method:'DELETE' });
    renderAll();
}

// ===== NEW CHESS GRID LOGIC =====
async function loadChessGrid(type) {
    const ds = chessDate.toISOString().split('T')[0];
    const res = await fetch(`/api/admin/chess?startDate=${ds}&days=14&type=${type}`);
    const data = await res.json();
    const el = document.getElementById(type+'Grid');
    if(!el) return;
    const dates = []; for(let i=0; i<14; i++) { let d=new Date(data.startDate); d.setDate(d.getDate()+i); dates.push(d); }
    
    let html = `<table class="chess-table"><thead><tr><th>Объект / №</th>`;
    dates.forEach(d => html += `<th><div style="font-size:.65rem">${d.getDate()} ${months[d.getMonth()]}</div><div style="font-size:.5rem;color:#666">${['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][d.getDay()]}</div></th>`);
    html += '</tr></thead><tbody>';
    
    data.roomTypes.forEach(rt => {
        html += `<tr style="background:#1a1d27"><td colspan="15" style="padding:.6rem;color:var(--gold-l);font-weight:800;font-size:.75rem">◈ ${rt.name.toUpperCase()}</td></tr>`;
        rt.units.forEach(u => {
            html += `<tr><td style="padding-left:1.5rem">${u}</td>`;
            dates.forEach(d => {
                const dayStr = d.toISOString().split('T')[0];
                const bOut = rt.bookings.find(b => b.checkOut.startsWith(dayStr) && b.unitNumber == u);
                const bIn = rt.bookings.find(b => b.checkIn.startsWith(dayStr) && b.unitNumber == u);
                const bMid = rt.bookings.find(b => dayStr > b.checkIn.split('T')[0] && dayStr < b.checkOut.split('T')[0] && b.unitNumber == u);
                const isSel = selRow?.unitNumber == u && selRow?.roomTypeId == rt.id && ((dayStr === selStart) || (selEnd && dayStr >= selStart && dayStr <= selEnd));
                
                html += `<td class="chess-cell ${bMid?'occupied':''} ${isSel?'selected':''}" onclick="onCellClick('${rt.id}','${rt.name}','${u}','${dayStr}','${rt.type}',${rt.price},${rt.priceWeekend})">`;
                if(bMid) html += `<div class="chess-booking" style="background:#38a169" title="${bMid.guest}"></div>`;
                else if(bIn || bOut) {
                    html += `<div class="chess-split">`;
                    if(bOut) html += `<div class="chess-split-out" style="background:#38a169" title="Выезд: ${bOut.guest}"></div>`;
                    if(bIn) html += `<div class="chess-split-in" style="background:#38a169" title="Заезд: ${bIn.guest}"></div>`;
                    html += `</div>`;
                }
                html += `</td>`;
            });
            html += '</tr>';
        });
    });
    el.innerHTML = html + '</tbody></table>';
}

function onCellClick(rtId, rtName, u, date, type, price, priceW) {
    if(!selStart || (selRow?.unitNumber != u || selRow?.roomTypeId != rtId)) { selStart = date; selEnd = null; }
    else if(date === selStart) { selStart = null; selEnd = null; }
    else if(new Date(date) < new Date(selStart)) { selStart = date; }
    else { selEnd = date; openBookingModal(); }
    selRow = { roomTypeId:rtId, roomName:rtName, unitNumber:u, type, price, priceW };
    loadChessGrid(currentTab);
}
function chessNav(d) { chessDate.setDate(chessDate.getDate()+d); loadChessGrid(currentTab); }
function chessToday() { chessDate = new Date(); chessDate.setHours(0,0,0,0); loadChessGrid(currentTab); }

// ===== HOURLY =====
async function loadHourly(type) {
    const d = document.getElementById(type+'Date').value || new Date().toISOString().split('T')[0];
    document.getElementById(type+'Date').value = d;
    const res = await fetch('/api/admin/bookings'); const all = await res.json();
    const busy = all.filter(b => b.type===type && b.status!=='cancelled' && b.checkIn.startsWith(d)).map(b => new Date(b.checkIn).getHours());
    const grid = document.getElementById(type+'Grid'); if(!grid) return;
    grid.innerHTML = Array.from({length:15},(_,i)=>i+9).map(h => `<div class="hour-btn ${busy.includes(h)?'booked':''} ${selectedHours.includes(h)?'selected':''}" onclick="toggleHour('${type}',${h},${busy.includes(h)})">${h}:00</div>`).join('');
}
function toggleHour(type, h, isB) {
    if(isB) return;
    if(selectedHours.includes(h)) selectedHours = selectedHours.filter(x=>x!==h); else selectedHours.push(h);
    const btn = document.getElementById(type+'BookBtn'); if(btn) btn.style.display = selectedHours.length ? 'block' : 'none';
    loadHourly(type);
}
function bookHourly(type) {
    const d = document.getElementById(type+'Date').value;
    const sH = Math.min(...selectedHours), eH = Math.max(...selectedHours)+1;
    const rt = globalRooms.find(r => r.type === type);
    selRow = { roomTypeId:rt.id, roomName:rt.name, type, price:rt.price, priceW:rt.priceWeekend };
    selStart = `${d}T${String(sH).padStart(2,'0')}:00:00`; selEnd = `${d}T${String(eH).padStart(2,'0')}:00:00`;
    openBookingModal();
}

// ===== RECEPTION LOGIC (OLD UI) =====
let recState = { type:'hotel', month:new Date().getMonth(), year:new Date().getFullYear(), checkIn:null, checkOut:null, hours:[] };
function initReception() {
    document.getElementById('recTypeSelect').value = recState.type;
    selectRecType(recState.type);
}
function selectRecType(t) {
    recState.type = t; recState.checkIn = null; recState.checkOut = null; recState.hours = [];
    const filtered = globalRooms.filter(r => r.type === t);
    document.getElementById('recRoomSelect').innerHTML = filtered.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    document.getElementById('recHourPanel').style.display = (t==='sauna' || t==='bath') ? 'block' : 'none';
    onRecRoomChange();
}
function onRecRoomChange() { renderRecCalendar(); updateRecSummary(); if(recState.type==='sauna' || recState.type==='bath') renderRecHours(); }
function changeRecMonth(d) { recState.month += d; if(recState.month<0){recState.month=11; recState.year--;} if(recState.month>11){recState.month=0; recState.year++;} renderRecCalendar(); }
function renderRecCalendar() {
    const s = recState; const grid = document.getElementById('recCalGrid');
    document.getElementById('recCalTitle').textContent = months[s.month] + ' ' + s.year;
    let html = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div style="font-size:.6rem; text-align:center; color:var(--muted)">${d}</div>`).join('');
    const first = new Date(s.year, s.month, 1).getDay(); const shift = first===0?6:first-1;
    const total = new Date(s.year, s.month+1, 0).getDate();
    for(let i=0; i<shift; i++) html += '<div></div>';
    for(let d=1; d<=total; d++) {
        const dt = new Date(s.year, s.month, d); dt.setHours(0,0,0,0);
        const isSel = (s.checkIn && dt.getTime()===s.checkIn.getTime()) || (s.checkOut && dt.getTime()===s.checkOut.getTime()) || (s.checkIn && s.checkOut && dt>s.checkIn && dt<s.checkOut);
        html += `<div class="adm-cal-day ${isSel?'selected':''}" onclick="selectRecDate(${dt.getTime()})">${d}</div>`;
    }
    grid.innerHTML = html;
}
function selectRecDate(ts) {
    const dt = new Date(ts);
    if(recState.type==='sauna' || recState.type==='bath') { recState.checkIn = dt; recState.checkOut = dt; renderRecHours(); }
    else { if(!recState.checkIn || (recState.checkIn && recState.checkOut)) { recState.checkIn = dt; recState.checkOut = null; } else if(dt > recState.checkIn) recState.checkOut = dt; else recState.checkIn = dt; }
    renderRecCalendar(); updateRecSummary();
}
function renderRecHours() {
    const busy = globalBookings.filter(b => b.room === globalRooms.find(r=>r.id==parseInt(document.getElementById('recRoomSelect').value))?.name && b.status!=='cancelled' && new Date(b.checkIn).toDateString() === recState.checkIn.toDateString()).map(b => new Date(b.checkIn).getHours());
    document.getElementById('recHourGrid').innerHTML = Array.from({length:15},(_,i)=>i+9).map(h => `<div class="hour-btn ${busy.includes(h)?'booked':''} ${recState.hours.includes(h)?'selected':''}" onclick="toggleRecHour(${h},${busy.includes(h)})">${h}:00</div>`).join('');
}
function toggleRecHour(h, isB) { if(isB) return; if(recState.hours.includes(h)) recState.hours = recState.hours.filter(x=>x!==h); else recState.hours.push(h); renderRecHours(); updateRecSummary(); }
function updateRecSummary() {
    const s = recState; const el = document.getElementById('recSelectionSummary');
    if(!s.checkIn) el.textContent = "Выберите дату";
    else if((s.type==='sauna'||s.type==='bath') && !s.hours.length) el.textContent = "Выберите часы";
    else if(s.type!=='sauna' && s.type!=='bath' && !s.checkOut) el.textContent = "Выберите дату выезда";
    else el.textContent = s.checkIn.toLocaleDateString() + (s.checkOut && s.checkOut!==s.checkIn ? ' — ' + s.checkOut.toLocaleDateString() : '') + (s.hours.length ? ' ('+s.hours.length+' ч.)' : '');
}
async function createManualBooking() {
    const guest = document.getElementById('recGuestName').value, phone = document.getElementById('recGuestPhone').value, total = parseInt(document.getElementById('recTotal').value);
    if(!guest || !phone || !recState.checkIn) return alert("Заполните данные");
    const r = globalRooms.find(x => x.id === parseInt(document.getElementById('recRoomSelect').value));
    let start = recState.checkIn.toISOString().split('T')[0], end = (recState.checkOut||recState.checkIn).toISOString().split('T')[0];
    if(recState.type==='sauna' || recState.type==='bath') {
        const sH = Math.min(...recState.hours), eH = Math.max(...recState.hours)+1;
        start += `T${String(sH).padStart(2,'0')}:00:00`; end += `T${String(eH).padStart(2,'0')}:00:00`;
    } else { start += 'T14:00:00'; end += 'T12:00:00'; }
    const b = { type:recState.type, room:r.name, roomTypeId:r.id, checkIn:start, checkOut:end, guest, phone, total, nights:recState.type.includes('sauna')?recState.hours.length:Math.ceil((recState.checkOut-recState.checkIn)/86400000), status:'confirmed' };
    await fetch('/api/bookings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b) });
    renderAll(); alert("Готово");
}

// ===== ROOM MANAGEMENT =====
async function loadRoomsForPhotos() {
    const res = await fetch('/api/rooms'); globalRooms = await res.json();
    document.getElementById('roomsPhotoList').innerHTML = globalRooms.map(r => `
        <div class="room-mgmt-card">
            <div style="display:flex; justify-content:space-between">
                <div><strong>${r.name}</strong> <span class="tag">${r.type}</span></div>
                <button class="btn-action" onclick="openRoomModal(${r.id})">✎ Изменить данные</button>
            </div>
            <div class="photo-grid">${r.imgs.map(img => `<div class="photo-item"><img src="${img}"><button class="btn-del-photo" onclick="deletePhoto(${r.id},'${img}')">×</button></div>`).join('')}</div>
            <div style="display:flex; gap:.5rem"><input type="file" id="file-${r.id}" class="form-input" style="margin:0"><button class="btn-action btn-gold" onclick="uploadPhoto(${r.id})">Загрузить</button></div>
        </div>
    `).join('');
}
function openRoomModal(id) {
    const r = globalRooms.find(x => x.id === id); if(!r) return;
    document.getElementById('r_id').value = r.id; document.getElementById('r_type').value = r.type; document.getElementById('r_name').value = r.name;
    document.getElementById('r_desc').value = r.desc; document.getElementById('r_price').value = r.price; document.getElementById('r_priceWeekend').value = r.priceWeekend || '';
    document.getElementById('r_area').value = r.area || ''; document.getElementById('r_capacity').value = r.capacity || ''; document.getElementById('r_amenities').value = r.amenities.join(', ');
    document.getElementById('roomModalOverlay').style.display='flex';
}
function closeRoomModal() { document.getElementById('roomModalOverlay').style.display='none'; }
async function saveRoom() {
    const id = document.getElementById('r_id').value;
    const b = { type:document.getElementById('r_type').value, name:document.getElementById('r_name').value, desc:document.getElementById('r_desc').value, price:Number(document.getElementById('r_price').value), priceWeekend:Number(document.getElementById('r_priceWeekend').value), area:document.getElementById('r_area').value, capacity:Number(document.getElementById('r_capacity').value), amenities:document.getElementById('r_amenities').value.split(',').map(s=>s.trim()) };
    await fetch('/api/rooms/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b) });
    closeRoomModal(); loadRoomsForPhotos();
}
async function uploadPhoto(id) { const fd = new FormData(); fd.append('photo', document.getElementById('file-'+id).files[0]); await fetch(`/api/rooms/${id}/photo`, {method:'POST', body:fd}); loadRoomsForPhotos(); }
async function deletePhoto(id, url) { if(confirm('Удалить?')) { await fetch(`/api/rooms/${id}/photo/delete`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({imgUrl:url})}); loadRoomsForPhotos(); } }

// ===== OTHERS =====
async function loadAllMenus() { ['restaurant','bar','cafe_kd'].forEach(loadMenuCategory); }
async function loadMenuCategory(cat) { const res = await fetch(`/api/menus?category=${cat}`); const items = await res.json(); document.getElementById('menu-grid-'+cat).innerHTML = items.map(i => `<div class="photo-item"><img src="${i.imgUrl}"><button class="btn-del-photo" onclick="deleteMenuImg(${i.id},'${cat}')">×</button></div>`).join(''); }
async function uploadMenuImg(cat) { const fd = new FormData(); fd.append('photo', document.getElementById('menu-file-'+cat).files[0]); fd.append('category', cat); await fetch('/api/menus', {method:'POST', body:fd}); loadMenuCategory(cat); }
async function deleteMenuImg(id, cat) { if(confirm('Удалить?')) { await fetch('/api/menus/'+id, {method:'DELETE'}); loadMenuCategory(cat); } }
async function loadRecipients() { const res = await fetch('/api/admin/broadcast/recipients'); document.getElementById('recipientCount').textContent = (await res.json()).count; }
async function sendBroadcast() { const m = document.getElementById('broadcastMessage').value; if(!m) return; await fetch('/api/admin/broadcast', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:m})}); alert("Отправлено"); }
async function loadBroadcastHistory() { const res = await fetch('/api/admin/broadcast/history'); const data = await res.json(); document.getElementById('broadcastHistory').innerHTML = data.map(h => `<div style="padding:1rem; border-bottom:1px solid var(--border)">${h.message}<br><small>${new Date(h.createdAt).toLocaleString()}</small></div>`).join(''); }

function openBookingModal() {
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('m_room').value = selRow.roomName + (selRow.unitNumber ? ` (№${selRow.unitNumber})` : '');
    document.getElementById('m_checkIn').value = selStart.split('T')[0];
    document.getElementById('m_checkOut').value = selEnd.split('T')[0];
    const s = new Date(selStart), e = new Date(selEnd);
    if(selRow.type === 'sauna' || selRow.type === 'bath') { const h = (e-s)/3600000; document.getElementById('m_nights').value = h; document.getElementById('m_total').value = h*selRow.price; }
    else { const n = Math.ceil((e-s)/86400000); let t = 0; for(let i=0; i<n; i++) { let c=new Date(s); c.setDate(c.getDate()+i); t += (c.getDay()===0||c.getDay()===5||c.getDay()===6) ? (selRow.priceW||selRow.price) : selRow.price; } document.getElementById('m_nights').value = n; document.getElementById('m_total').value = t; }
}
function closeModal() { document.getElementById('modalOverlay').style.display='none'; selectedHours=[]; selStart=null; selEnd=null; document.querySelectorAll('.btn-book-hourly').forEach(b=>b.style.display='none'); }
async function submitModalBooking() {
    const g = document.getElementById('m_guest').value, p = document.getElementById('m_phone').value; if(!g || !p) return alert("Заполните имя и телефон");
    const b = { type:selRow.type, room:selRow.roomName, roomTypeId:selRow.roomTypeId, forceUnitNumber:selRow.unitNumber, checkIn:document.getElementById('m_checkIn').value + (selRow.type==='hotel'?'T14:00:00':selStart.includes('T')?selStart.split('T')[1]:'T14:00:00'), checkOut:document.getElementById('m_checkOut').value + (selRow.type==='hotel'?'T12:00:00':selEnd.includes('T')?selEnd.split('T')[1]:'T12:00:00'), guest:g, phone:p, total:parseInt(document.getElementById('m_total').value), nights:parseInt(document.getElementById('m_nights').value), status:'confirmed' };
    await fetch('/api/bookings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b) }); closeModal(); renderAll();
}

async function init() { const res = await fetch('/api/rooms'); globalRooms = await res.json(); if(sessionStorage.getItem('chalama_admin')) showDashboard(); }
init();
</script>
